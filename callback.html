<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Login - Callback</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    max-width: 600px;
    margin: 60px auto;
    padding: 20px;
    text-align: center;
    color: #1a1a1a;
  }
  .box {
    border: 2px solid #eee;
    border-radius: 12px;
    padding: 30px;
    background: #fafafa;
  }
  h1 { font-size: 22px; }
  .code-box {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 16px;
    word-break: break-all;
    font-family: monospace;
    font-size: 15px;
    margin: 16px 0;
    user-select: all;
  }
  .label { font-weight: bold; margin-top: 20px; }
  .error { color: #d00; }
  button {
    background: #6c47ff;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="box">
  <h1>تسجيل الدخول عبر TikTok</h1>
  <div id="content">جاري القراءة...</div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  const state = params.get("state");
  const error = params.get("error");
  const errorDescription = params.get("error_description");

  const content = document.getElementById("content");

  if (code) {
    content.innerHTML = `
      <p>تم استلام الكود بنجاح. انسخيه وحطيه بالـ terminal:</p>
      <div class="label">Authorization Code:</div>
      <div class="code-box" id="codeBox">${code}</div>
      <div class="label">State:</div>
      <div class="code-box">${state || "(none)"}</div>
      <button onclick="navigator.clipboard.writeText('${code}')">نسخ الكود</button>
    `;
  } else if (error) {
    content.innerHTML = `
      <p class="error">صار خطأ:</p>
      <div class="code-box">${error}: ${errorDescription || ""}</div>
    `;
  } else {
    content.innerHTML = `<p class="error">ما لقيناش أي كود أو خطأ بالرابط.</p>`;
  }
</script>

</body>
</html>
